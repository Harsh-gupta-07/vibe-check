<!-- Brand Header -->
<div class="mb-xl text-center">
<h1 class="font-display-lg text-display-lg tracking-tighter text-primary">VIBE CHECK</h1>
</div>
<!-- Glassmorphism Auth Card -->
<div class="w-full bg-surface/60 backdrop-blur-[32px] border border-white/10 rounded-[24px] p-lg shadow-2xl flex flex-col gap-lg">
<!-- Toggle: Join / Log In -->
<div class="flex p-unit bg-surface-container-highest rounded-full w-full">
<button class="flex-1 py-sm px-md rounded-full bg-primary-container text-on-primary-container font-headline-md text-headline-md text-center shadow-[0_0_12px_rgba(188,19,254,0.3)] transition-all">
                    Join
                </button>
<button class="flex-1 py-sm px-md rounded-full text-on-surface-variant font-headline-md text-headline-md text-center hover:text-on-surface transition-colors">
                    Log In
                </button>
</div>
<!-- Phone Input Form Group -->
<div class="flex flex-col gap-sm">
<label class="font-label-caps text-label-caps text-on-surface-variant uppercase tracking-widest pl-unit">Phone Number</label>
<div class="flex border border-outline-variant bg-surface-container rounded-lg overflow-hidden focus-within:border-primary focus-within:ring-1 focus-within:ring-primary transition-all shadow-inner">
<!-- Country Code Picker -->
<button class="flex items-center gap-xs px-md py-md bg-surface-container-highest border-r border-outline-variant hover:bg-surface-bright transition-colors">
<span class="font-body-md text-body-md text-on-surface">+1</span>
<span class="material-symbols-outlined text-on-surface-variant" data-icon="arrow_drop_down" style="font-size: 20px;">arrow_drop_down</span>
</button>
<!-- Number Input -->
<input class="flex-1 bg-transparent border-none outline-none px-md py-md font-body-md text-body-md text-on-surface placeholder:text-on-surface-variant/50 w-full" placeholder="(555) 000-0000" type="tel"/>
</div>
</div>
<!-- Primary Action -->
<button class="w-full bg-primary text-on-primary font-headline-md text-headline-md py-md rounded-lg shadow-[0_0_16px_rgba(235,178,255,0.2)] hover:bg-primary-fixed transition-all hover:scale-[0.98]">
                Continue
            </button>

<span class="font-label-caps text-label-caps text-on-surface-variant uppercase">Or</span>

<span class="font-headline-md text-headline-md text-base">Continue with Apple</span>
</button>
<button class="w-full flex items-center justify-center gap-sm py-sm px-md rounded-lg border border-outline-variant bg-surface-container-low hover:bg-surface-container transition-colors text-on-surface">
<span class="material-symbols-outlined" data-icon="account_circle">account_circle</span>
