<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Report Incident - Vibe Check</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@600;800&amp;family=Inter:wght@400&amp;family=JetBrains+Mono:wght@500&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "primary-container": "#bc13fe",
                        "on-secondary-fixed-variant": "#004f53",
                        "inverse-surface": "#e5e2e1",
                        "surface-dim": "#131313",
                        "tertiary-fixed-dim": "#ffb4aa",
                        "outline-variant": "#504254",
                        "on-background": "#e5e2e1",
                        "primary": "#ebb2ff",
                        "surface-container-high": "#2a2a2a",
                        "tertiary": "#ffb4aa",
                        "surface-container": "#201f1f",
                        "on-tertiary-fixed": "#410001",
                        "secondary-fixed-dim": "#00dce6",
                        "primary-fixed": "#f8d8ff",
                        "surface-container-low": "#1c1b1b",
                        "on-primary": "#520072",
                        "surface-bright": "#3a3939",
                        "secondary-fixed": "#6ff6ff",
                        "on-tertiary-fixed-variant": "#930005",
                        "on-secondary-container": "#006a6f",
                        "tertiary-container": "#e62721",
                        "outline": "#9d8ba0",
                        "on-error-container": "#ffdad6",
                        "inverse-primary": "#9800d0",
                        "error-container": "#93000a",
                        "surface-container-lowest": "#0e0e0e",
                        "error": "#ffb4ab",
                        "background": "#131313",
                        "surface": "#131313",
                        "primary-fixed-dim": "#ebb2ff",
                        "surface-container-highest": "#353534",
                        "surface-tint": "#ebb2ff",
                        "on-tertiary-container": "#140000",
                        "on-secondary-fixed": "#002022",
                        "inverse-on-surface": "#313030",
                        "on-surface": "#e5e2e1",
                        "secondary": "#dcfdff",
                        "on-primary-fixed": "#320047",
                        "surface-variant": "#353534",
                        "tertiary-fixed": "#ffdad5",
                        "on-tertiary": "#690003",
                        "on-error": "#690005",
                        "secondary-container": "#00f1fd",
                        "on-primary-fixed-variant": "#74009f",
                        "on-primary-container": "#ffffff",
                        "on-surface-variant": "#d4c0d7",
                        "on-secondary": "#00373a"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "gutter": "16px",
                        "unit": "4px",
                        "xl": "40px",
                        "margin": "20px",
                        "xs": "4px",
                        "md": "16px",
                        "sm": "8px",
                        "lg": "24px"
                    },
                    "fontFamily": {
                        "body-md": ["Inter"],
                        "headline-md": ["Hanken Grotesk"],
                        "body-lg": ["Inter"],
                        "label-caps": ["JetBrains Mono"],
                        "display-lg": ["Hanken Grotesk"]
                    },
                    "fontSize": {
                        "body-md": ["16px", { "lineHeight": "1.5", "letterSpacing": "0em", "fontWeight": "400" }],
                        "headline-md": ["24px", { "lineHeight": "1.2", "letterSpacing": "-0.01em", "fontWeight": "600" }],
                        "body-lg": ["18px", { "lineHeight": "1.5", "letterSpacing": "0em", "fontWeight": "400" }],
                        "label-caps": ["12px", { "lineHeight": "1.0", "letterSpacing": "0.1em", "fontWeight": "500" }],
                        "display-lg": ["40px", { "lineHeight": "1.1", "letterSpacing": "-0.02em", "fontWeight": "800" }]
                    }
                }
            }
        }
    </script>
<style>
        .glass-panel {
            background-color: rgba(26, 26, 26, 0.8);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 0.5px solid rgba(255, 255, 255, 0.1);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-background font-body-md min-h-screen flex flex-col antialiased selection:bg-primary-container selection:text-on-primary-container">
<!-- TopAppBar -->
<header class="bg-surface/80 dark:bg-surface/80 backdrop-blur-xl border-b border-white/10 docked full-width top-0 sticky z-50 flex items-center justify-between px-margin py-4 w-full">
<button aria-label="Go back" class="text-primary dark:text-primary-fixed-dim hover:bg-surface-container-highest/50 transition-colors p-2 rounded-full flex items-center justify-center active:scale-95 duration-150">
<span class="material-symbols-outlined" data-icon="arrow_back">arrow_back</span>
</button>
<h1 class="font-headline-md text-headline-md text-primary dark:text-primary-fixed-dim text-center flex-1">Report Incident</h1>
<div class="w-[40px]"></div> <!-- Spacer to balance flex-1 and back button -->
</header>
<!-- Main Content Canvas -->
<main class="flex-1 px-margin pt-lg pb-xl flex flex-col gap-lg max-w-2xl mx-auto w-full">
<div class="space-y-sm">
<h2 class="font-headline-md text-headline-md text-on-surface">What happened?</h2>
<p class="font-body-md text-body-md text-on-surface-variant">Your report is anonymous. We take all reports seriously to ensure a safe environment.</p>
</div>
<!-- Reporting Reasons (Radio List) -->
<div class="flex flex-col gap-sm">
<label class="glass-panel p-md rounded-xl flex items-center justify-between cursor-pointer hover:bg-surface-container-high transition-colors group">
<span class="font-body-lg text-body-lg text-on-surface group-hover:text-primary transition-colors">Harassment or Bullying</span>
<input class="w-5 h-5 text-primary-container bg-surface-container border-outline focus:ring-primary-container focus:ring-offset-background" name="report_reason" type="radio"/>
</label>
<label class="glass-panel p-md rounded-xl flex items-center justify-between cursor-pointer hover:bg-surface-container-high transition-colors group">
<span class="font-body-lg text-body-lg text-on-surface group-hover:text-primary transition-colors">Spamming or Fake Profile</span>
<input class="w-5 h-5 text-primary-container bg-surface-container border-outline focus:ring-primary-container focus:ring-offset-background" name="report_reason" type="radio"/>
</label>
<label class="glass-panel p-md rounded-xl flex items-center justify-between cursor-pointer hover:bg-surface-container-high transition-colors group">
<span class="font-body-lg text-body-lg text-on-surface group-hover:text-primary transition-colors">Inappropriate Content</span>
<input class="w-5 h-5 text-primary-container bg-surface-container border-outline focus:ring-primary-container focus:ring-offset-background" name="report_reason" type="radio"/>
</label>
<label class="glass-panel p-md rounded-xl flex items-center justify-between cursor-pointer hover:bg-surface-container-high transition-colors group">
<span class="font-body-lg text-body-lg text-on-surface group-hover:text-primary transition-colors">Underage User</span>
<input class="w-5 h-5 text-primary-container bg-surface-container border-outline focus:ring-primary-container focus:ring-offset-background" name="report_reason" type="radio"/>
</label>
<label class="glass-panel p-md rounded-xl flex items-center justify-between cursor-pointer hover:bg-surface-container-high transition-colors group">
<span class="font-body-lg text-body-lg text-on-surface group-hover:text-primary transition-colors">Other</span>
<input class="w-5 h-5 text-primary-container bg-surface-container border-outline focus:ring-primary-container focus:ring-offset-background" name="report_reason" type="radio"/>
</label>
</div>
<!-- Additional Details Text Area -->
<div class="flex flex-col gap-sm mt-md">
<label class="font-label-caps text-label-caps text-on-surface-variant uppercase tracking-wider" for="details">Additional Details</label>
<textarea class="glass-panel w-full rounded-xl p-md font-body-md text-body-md text-on-surface placeholder:text-outline-variant focus:border-primary-container focus:ring-1 focus:ring-primary-container outline-none resize-none transition-all" id="details" placeholder="Please provide any specific details to help us investigate..." rows="4"></textarea>
</div>
</main>
<!-- Bottom Action Area -->
<div class="fixed bottom-0 left-0 w-full px-margin pb-xl pt-md bg-gradient-to-t from-background via-background/90 to-transparent z-40">
<div class="max-w-2xl mx-auto">
<button class="w-full py-lg bg-[#FF3B30] text-[#FFFFFF] rounded-xl font-headline-md text-headline-md shadow-[0_0_20px_rgba(255,59,48,0.3)] hover:bg-[#FF453A] active:scale-95 transition-all flex items-center justify-center gap-sm">
<span class="material-symbols-outlined" data-icon="warning" data-weight="fill" style="font-variation-settings: 'FILL' 1;">warning</span>
                Submit Report
            </button>
</div>
</div>
</body></html>
