<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>VIBE CHECK - Setup</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@600;800&amp;family=Inter:wght@400&amp;family=JetBrains+Mono:wght@500&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "tertiary-fixed-dim": "#ffb4aa",
                        "error": "#ffb4ab",
                        "error-container": "#93000a",
                        "inverse-on-surface": "#313030",
                        "secondary-fixed": "#6ff6ff",
                        "surface-container-lowest": "#0e0e0e",
                        "tertiary-fixed": "#ffdad5",
                        "on-secondary": "#00373a",
                        "on-surface": "#e5e2e1",
                        "on-surface-variant": "#d4c0d7",
                        "on-error-container": "#ffdad6",
                        "surface-container-highest": "#353534",
                        "on-tertiary-fixed": "#410001",
                        "surface-dim": "#131313",
                        "secondary-fixed-dim": "#00dce6",
                        "inverse-surface": "#e5e2e1",
                        "surface-container": "#201f1f",
                        "on-error": "#690005",
                        "on-primary": "#520072",
                        "primary-fixed": "#f8d8ff",
                        "on-tertiary": "#690003",
                        "on-secondary-fixed-variant": "#004f53",
                        "on-tertiary-container": "#140000",
                        "surface-container-low": "#1c1b1b",
                        "outline": "#9d8ba0",
                        "tertiary-container": "#e62721",
                        "primary-fixed-dim": "#ebb2ff",
                        "on-tertiary-fixed-variant": "#930005",
                        "outline-variant": "#504254",
                        "inverse-primary": "#9800d0",
                        "on-secondary-container": "#006a6f",
                        "on-primary-container": "#ffffff",
                        "surface-tint": "#ebb2ff",
                        "on-primary-fixed-variant": "#74009f",
                        "surface-container-high": "#2a2a2a",
                        "surface-bright": "#3a3939",
                        "on-primary-fixed": "#320047",
                        "on-secondary-fixed": "#002022",
                        "primary-container": "#bc13fe",
                        "surface": "#131313",
                        "secondary": "#dcfdff",
                        "primary": "#ebb2ff",
                        "secondary-container": "#00f1fd",
                        "tertiary": "#ffb4aa",
                        "surface-variant": "#353534",
                        "background": "#131313",
                        "on-background": "#e5e2e1"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "lg": "24px",
                        "xs": "4px",
                        "xl": "40px",
                        "unit": "4px",
                        "md": "16px",
                        "gutter": "16px",
                        "margin": "20px",
                        "sm": "8px"
                    },
                    "fontFamily": {
                        "display-lg": ["Hanken Grotesk"],
                        "headline-md": ["Hanken Grotesk"],
                        "body-lg": ["Inter"],
                        "body-md": ["Inter"],
                        "label-caps": ["JetBrains Mono"]
                    },
                    "fontSize": {
                        "display-lg": ["40px", { "lineHeight": "1.1", "letterSpacing": "-0.02em", "fontWeight": "800" }],
                        "headline-md": ["24px", { "lineHeight": "1.2", "letterSpacing": "-0.01em", "fontWeight": "600" }],
                        "body-lg": ["18px", { "lineHeight": "1.5", "letterSpacing": "0em", "fontWeight": "400" }],
                        "body-md": ["16px", { "lineHeight": "1.5", "letterSpacing": "0em", "fontWeight": "400" }],
                        "label-caps": ["12px", { "lineHeight": "1.0", "letterSpacing": "0.1em", "fontWeight": "500" }]
                    }
                }
            }
        }
    </script>
<style>
        body { background-color: theme('colors.background'); color: theme('colors.on-background'); }
        /* Glassmorphism utilities */
        .glass-panel {
            background-color: rgba(26, 26, 26, 0.8);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 0.5px solid rgba(255, 255, 255, 0.1);
        }
        .glass-overlay {
            background-color: rgba(19, 19, 19, 0.6);
            backdrop-filter: blur(32px);
            -webkit-backdrop-filter: blur(32px);
        }
        .glow-active {
            box-shadow: 0 0 12px theme('colors.primary');
        }
        
        /* Custom input styling for dark theme */
        .input-dark {
            background-color: theme('colors.surface-container');
            border: 1px solid theme('colors.outline-variant');
            color: theme('colors.on-surface');
        }
        .input-dark:focus {
            border-color: theme('colors.primary');
            box-shadow: 0 0 0 1px theme('colors.primary');
            outline: none;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="min-h-screen flex items-center justify-center p-margin relative overflow-hidden">
<!-- Abstract Background Element -->
<div class="absolute inset-0 z-0 opacity-30 mix-blend-screen pointer-events-none" style="background-image: radial-gradient(circle at 50% 50%, rgba(188, 19, 254, 0.15) 0%, transparent 60%), radial-gradient(circle at 80% 20%, rgba(0, 241, 253, 0.1) 0%, transparent 50%);">
</div>
<!-- Main Setup Container -->
<div class="relative z-10 w-full max-w-[400px] flex flex-col gap-lg">
<!-- Header -->
<div class="text-center mb-md">
<h1 class="font-display-lg text-display-lg text-primary tracking-tighter mb-xs">VIBE CHECK</h1>
<p class="font-body-md text-body-md text-on-surface-variant">Initialize your presence.</p>
</div>
<!-- Setup Card -->
<div class="glass-panel rounded-xl p-lg flex flex-col gap-lg shadow-2xl">
<!-- OTP Section (Simulated Active) -->
<div class="flex flex-col gap-sm">
<label class="font-label-caps text-label-caps text-on-surface-variant uppercase">Verify Identity</label>
<div class="flex gap-sm">
<input class="w-12 h-14 text-center font-headline-md text-headline-md input-dark rounded-lg" maxlength="1" type="text" value="8"/>
<input class="w-12 h-14 text-center font-headline-md text-headline-md input-dark rounded-lg glow-active border-primary" maxlength="1" type="text" value="4"/>
<input class="w-12 h-14 text-center font-headline-md text-headline-md input-dark rounded-lg" maxlength="1" placeholder="-" type="text"/>
<input class="w-12 h-14 text-center font-headline-md text-headline-md input-dark rounded-lg" maxlength="1" placeholder="-" type="text"/>
<input class="w-12 h-14 text-center font-headline-md text-headline-md input-dark rounded-lg" maxlength="1" placeholder="-" type="text"/>
<input class="w-12 h-14 text-center font-headline-md text-headline-md input-dark rounded-lg" maxlength="1" placeholder="-" type="text"/>
</div>
<p class="font-label-caps text-[10px] text-secondary mt-1 text-right cursor-pointer hover:opacity-80">RESEND CODE</p>
</div>
<div class="w-full h-[1px] bg-white/10 my-xs"></div>
<!-- Profile Details -->
<div class="flex flex-col gap-md">
<!-- Handle -->
<div class="flex flex-col gap-xs">
<label class="font-label-caps text-label-caps text-on-surface-variant uppercase flex justify-between items-end">
<span>Anonymous Handle</span>
<span class="text-[10px] text-primary opacity-80">REQUIRED</span>
</label>
<div class="relative">
<span class="absolute left-3 top-1/2 -translate-y-1/2 font-body-md text-on-surface-variant">@</span>
<input class="w-full pl-8 pr-3 py-3 font-body-md text-body-md input-dark rounded-lg" placeholder="neon_ghost" type="text"/>
</div>
</div>
<!-- Age & Gender Grid -->
<div class="grid grid-cols-2 gap-md">
<!-- Age -->
<div class="flex flex-col gap-xs">
<label class="font-label-caps text-label-caps text-on-surface-variant uppercase">Age</label>
<div class="relative">
<select class="w-full px-3 py-3 font-body-md text-body-md input-dark rounded-lg appearance-none">
<option disabled="" selected="" value="">Select</option>
<option value="18-24">18 - 24</option>
<option value="25-34">25 - 34</option>
<option value="35-44">35 - 44</option>
<option value="45+">45+</option>
</select>
<span class="material-symbols-outlined absolute right-3 top-1/2 -translate-y-1/2 text-on-surface-variant pointer-events-none" style="font-variation-settings: 'FILL' 0;">expand_more</span>
</div>
</div>
<!-- Gender -->
<div class="flex flex-col gap-xs">
<label class="font-label-caps text-label-caps text-on-surface-variant uppercase">Identity</label>
<div class="relative">
<select class="w-full px-3 py-3 font-body-md text-body-md input-dark rounded-lg appearance-none">
<option disabled="" selected="" value="">Select</option>
<option value="m">Male</option>
<option value="f">Female</option>
<option value="nb">Non-binary</option>
<option value="o">Other</option>
<option value="pns">Prefer not to say</option>
</select>
<span class="material-symbols-outlined absolute right-3 top-1/2 -translate-y-1/2 text-on-surface-variant pointer-events-none" style="font-variation-settings: 'FILL' 0;">expand_more</span>
</div>
</div>
</div>
</div>
<!-- Action Button -->
<button class="w-full py-4 mt-sm bg-primary/20 text-primary-fixed-dim border border-primary/50 rounded-lg font-label-caps text-label-caps uppercase tracking-widest hover:bg-primary/30 transition-colors flex items-center justify-center gap-2">
<span>Enter Void</span>
<span class="material-symbols-outlined text-[16px]">arrow_forward</span>
</button>
</div>
</div>
<!-- 18+ Age Gate Overlay (Consent Prompt) -->
<div class="fixed inset-0 z-50 glass-overlay flex items-center justify-center p-margin">
<div class="bg-surface border border-white/10 rounded-xl p-lg w-full max-w-[340px] flex flex-col items-center text-center shadow-2xl">
<div class="w-16 h-16 rounded-full bg-error/10 flex items-center justify-center mb-md border border-error/20">
<span class="material-symbols-outlined text-error text-[32px]" style="font-variation-settings: 'FILL' 1;">warning</span>
</div>
<h2 class="font-headline-md text-headline-md text-on-surface mb-sm">Age Verification Required</h2>
<p class="font-body-md text-body-md text-on-surface-variant mb-lg">
                VIBE CHECK is strictly for adults. You must be 18 years or older to enter this environment. Falsifying your age will result in a permanent ban.
            </p>
<div class="w-full flex flex-col gap-sm">
<button class="w-full py-3 bg-primary text-on-primary rounded-lg font-label-caps text-label-caps uppercase tracking-widest hover:opacity-90 transition-opacity">
                    I am 18 or older
                </button>
<button class="w-full py-3 bg-transparent border border-outline-variant text-on-surface-variant rounded-lg font-label-caps text-label-caps uppercase tracking-widest hover:bg-white/5 transition-colors">
                    Exit
                </button>
</div>
</div>
</div>
</body></html>
